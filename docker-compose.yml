# Frontend (nginx + build de Vite). HTTPS en 443; puerto 80 redirige a 443.
#
# Despliegue (producción, corte breve en 80/443):
#   /opt/plataforma-ciudadanos/app/plataforma_ciudadanos_frontend/deploy.sh
#
# Certificados en el host (p. ej. Let's Encrypt):
#   SSL_FULLCHAIN_PATH=/etc/letsencrypt/live/tudominio.com/fullchain.pem
#   SSL_PRIVKEY_PATH=/etc/letsencrypt/live/tudominio.com/privkey.pem
#
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?Define VITE_API_URL en .env}
        VITE_UPLOADS_URL: ${VITE_UPLOADS_URL:?Define VITE_UPLOADS_URL en .env}
        VITE_GOOGLE_MAPS_ENABLED: ${VITE_GOOGLE_MAPS_ENABLED:-false}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    container_name: plataforma-frontend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${SSL_FULLCHAIN_PATH:?Define SSL_FULLCHAIN_PATH en .env}:/etc/nginx/ssl/fullchain.pem:ro
      - ${SSL_PRIVKEY_PATH:?Define SSL_PRIVKEY_PATH en .env}:/etc/nginx/ssl/privkey.pem:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
